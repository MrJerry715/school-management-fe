<div class="p-6 bg-gray-100 min-h-screen">
  <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between mb-8">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Reports Center</h1>
      <p class="text-gray-500 mt-1">Generate and review key school performance reports.</p>
    </div>
    <button class="px-5 py-3 rounded-full bg-[#1F4C73] text-white font-medium hover:bg-[#163f60] transition">
      Create Report
    </button>
  </div>

  <div class="grid gap-4 md:grid-cols-3 mb-8">
    <div *ngFor="let report of reports" class="rounded-3xl bg-white p-6 shadow-sm border border-slate-200 hover:shadow-md transition">
      <h2 class="text-lg font-semibold text-gray-900">{{ report.title }}</h2>
      <p class="text-sm text-gray-500 mt-3">{{ report.description }}</p>
      <button class="mt-6 text-sm text-[#1F4C73] font-medium hover:underline">Open report</button>
    </div>
  </div>
</div>
