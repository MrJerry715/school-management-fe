<div class="h-screen flex items-center justify-center bg-[#eef3f9] px-4">
  <div class="w-full max-w-md rounded-[32px] bg-white p-10 shadow-xl border border-slate-200">
    <div class="mb-10 text-center">
      <p class="text-sm uppercase tracking-[0.3em] text-slate-500">Admin Portal</p>
      <h1 class="mt-3 text-4xl font-bold text-[#014367]">🛡️ Admin Login</h1>
      <p class="mt-2 text-sm text-gray-500">Manage school operations, users, and reports</p>
    </div>

    <form class="flex flex-col gap-4" (ngSubmit)="onLoginClicked()">
      <mat-form-field class="w-full">
        <mat-label>Username</mat-label>
        <input matInput placeholder="admin" [formControl]="username" required />
        @if (username.invalid && username.touched) {
          <mat-error>Username is required</mat-error>
        }
      </mat-form-field>

      <mat-form-field class="w-full">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="hide() ? 'password' : 'text'"
          [formControl]="password"
          placeholder="Enter password"
          required
        />
        <button
          mat-icon-button
          matSuffix
          (click)="clickEvent($event)"
          [attr.aria-label]="'Toggle password visibility'"
        >
          <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        @if (password.invalid && password.touched) {
          <mat-error>Password is required</mat-error>
        }
      </mat-form-field>

      @if (errorMessage()) {
        <div class="text-red-600 text-sm font-medium">{{ errorMessage() }}</div>
      }

      <button mat-flat-button color="primary" class="w-full py-4 text-base font-semibold" type="submit">
        Sign In
      </button>

      <a href="/login" class="text-center text-sm text-[#1F4C73] hover:underline">
        Back to Role Selection
      </a>
    </form>
  </div>
</div>
