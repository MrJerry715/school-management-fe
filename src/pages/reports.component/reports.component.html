<div class="page-stack">
  <section class="page-hero">
    <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
      <div>
        <p class="eyebrow">Reports</p>
        <h1 class="page-title">Reports Center</h1>
        <p class="muted-copy mt-2">Generate and review key school performance reports.</p>
      </div>
      <button class="btn-primary">
        Create Report
      </button>
    </div>

    <div class="grid gap-4 mt-8 md:grid-cols-3">
      <div *ngFor="let report of reports" class="action-card">
        <h2 class="text-lg font-semibold text-slate-900">{{ report.title }}</h2>
        <p class="text-sm text-slate-500 mt-3">{{ report.description }}</p>
        <button class="mt-6 text-sm text-[#1F4C73] font-medium hover:underline">Open report</button>
      </div>
    </div>
  </section>
</div>
