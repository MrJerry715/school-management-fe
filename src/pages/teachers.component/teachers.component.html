<div class="page-stack">
  <section class="page-hero">
    <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
      <div>
        <p class="eyebrow">Faculty</p>
        <h1 class="page-title">Teachers Dashboard</h1>
        <p class="muted-copy mt-2">Manage teacher assignments, subjects, and communication details.</p>
      </div>
      <button class="btn-primary">
        Add Teacher
      </button>
    </div>

    <div class="grid gap-4 mt-8 md:grid-cols-4">
      <div *ngFor="let item of summary" class="metric-card">
        <p class="text-sm uppercase tracking-[0.24em] text-slate-500">{{ item.label }}</p>
        <p class="mt-5 text-3xl font-semibold text-slate-900">{{ item.value }}</p>
      </div>
    </div>
  </section>

  <section class="surface">
    <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between mb-6">
      <div>
        <h2 class="text-xl font-semibold text-slate-900">Teacher Contacts</h2>
        <p class="text-sm text-slate-500">Quick access to the teaching team.</p>
      </div>
      <button class="text-sm text-[#1F4C73] font-medium hover:underline">Export contacts</button>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      <div *ngFor="let teacher of teacherList" class="action-card">
        <p class="text-lg font-semibold text-slate-900">{{ teacher.name }}</p>
        <p class="text-sm text-slate-600 mt-1">{{ teacher.subject }}</p>
        <p class="text-sm text-slate-500 mt-2">{{ teacher.contact }}</p>
      </div>
    </div>
  </section>
</div>
